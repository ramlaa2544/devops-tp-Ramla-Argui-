<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager Lite</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-check-circle"></i>
          <span>TaskLite</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all">
          <i class="fas fa-list"></i>
          <span>Toutes</span>
          <span class="badge" id="badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="pending">
          <i class="fas fa-clock"></i>
          <span>En attente</span>
          <span class="badge" id="badge-pending">0</span>
        </button>
        <button class="nav-item" data-filter="in-progress">
          <i class="fas fa-spinner"></i>
          <span>En cours</span>
          <span class="badge" id="badge-in-progress">0</span>
        </button>
        <button class="nav-item" data-filter="done">
          <i class="fas fa-check"></i>
          <span>Terminées</span>
          <span class="badge" id="badge-done">0</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1>Mes Tâches</h1>
          <p class="subtitle">Gérez vos tâches efficacement</p>
        </div>
        <button class="btn-add" id="btn-open-modal">
          <i class="fas fa-plus"></i>
          Nouvelle tâche
        </button>
      </header>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-icon pending">
            <i class="fas fa-clock"></i>
          </div>
          <div class="stat-info">
            <span class="stat-number" id="stat-pending">0</span>
            <span class="stat-label">En attente</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon in-progress">
            <i class="fas fa-spinner"></i>
          </div>
          <div class="stat-info">
            <span class="stat-number" id="stat-in-progress">0</span>
            <span class="stat-label">En cours</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon done">
            <i class="fas fa-check"></i>
          </div>
          <div class="stat-info">
            <span class="stat-number" id="stat-done">0</span>
            <span class="stat-label">Terminées</span>
          </div>
        </div>
      </div>

      <!-- Tasks List -->
      <div class="tasks-container">
        <div class="tasks-header">
          <h2 id="tasks-title">Toutes les tâches</h2>
          <input type="text" class="search-input" id="search-input" placeholder="Rechercher une tâche..." />
        </div>
        <div class="tasks-list" id="tasks-list">
          <!-- Tasks will be rendered here -->
        </div>
        <div class="empty-state" id="empty-state" style="display:none">
          <i class="fas fa-clipboard-list"></i>
          <p>Aucune tâche pour le moment</p>
          <span>Créez votre première tâche !</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Nouvelle tâche</h3>
        <button class="btn-close" id="btn-close-modal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Titre <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="Titre de la tâche..." />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="task-description" placeholder="Description optionnelle..."></textarea>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select id="task-status">
            <option value="pending">En attente</option>
            <option value="in-progress">En cours</option>
            <option value="done">Terminée</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priorité</label>
          <div class="priority-group">
            <button class="priority-btn active" data-priority="low">Basse</button>
            <button class="priority-btn" data-priority="medium">Moyenne</button>
            <button class="priority-btn" data-priority="high">Haute</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-cancel">Annuler</button>
        <button class="btn-save" id="btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
